<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
    <meta name="viewport" content="width:device-width, initial-scale:1.0">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    </head>
<body>
    <button id="menuToggle" class="menu-btn">☰</button>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
        <span class="logo">Subbly</span>
    </div>
            <nav>
                <button id="addSubscription" class="nav-item active">
                <span class="icon">+</span> Add Subscription
            </button>
            <button class="nav-item">
                <span class="icon">📊</span> Budgeting (Soon)
            </button>
            <button class="nav-item">
                <span class="icon">⚙️</span> Settings
            </button>
            </nav>
            <button id="logout">Logout</button>
        </aside>
    </div>
    <dialog id="modal">
        <form id="subForm">
            <h2>Add Subscription</h2>
            <div class="form-group">
                <label for="subName">Name: </label>
                <input type="text" id="subName" name="subName" placeholder="e.g Netflix" required>
            </div>
            <div class="form-group">
                <label for="price">Amount: </label>
                <input type="text" id="price" name="price" placeholder="Enter Amount" required>
            </div>
            <div class="form-group">
                <label for="currency">Currency:</label>
                <select id="currency" name="currency">
                    <option value="USD" selected>US Dollar ($)</option>
                </select>
            </div>
            <!-- Categories come from dashboard.js initCategories -->
            <div class="form-group">
                <label for="category">Category: </label>
                <select id="category" name="category">
                </select>
            </div>
            <div class="form-group">
                <label for="billingCycle">Billing Cycle: </label>
                <select id="billingCycle" name="billingCycle">
                    <option value="Monthly" selected>Monthly</option>
                    <option value="Weekly" >Weekly</option>
                    <option value="Yearly" >Yearly</option> 
                </select>
            </div>
        <div class="modal-actions">
        <button type="submit" id="saveModal" class="save-btn">Save</button>
        <button type="button" id="closeModal" class="cancel-btn">Cancel</button>
        </div>
        </form>

    </dialog>
    <script src="dashBoard.js"></script>
</body>
</html>
